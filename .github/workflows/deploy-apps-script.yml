name: Deploy Apps Script

on:
  push:
    branches: [main]
    paths:
      - 'apps-script/**'
      - '.github/workflows/deploy-apps-script.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Write clasp credentials
        run: |
          echo "$CLASPRC_JSON" > ~/.clasprc.json
          cat ~/.clasprc.json | python3 -c "import sys,json; d=json.load(sys.stdin); print('tokens?', 'tokens' in d)"
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}

      - name: Push to Apps Script
        working-directory: apps-script
        run: clasp push -f

      - name: Deploy as Web App
        working-directory: apps-script
        run: clasp deploy --description "auto-deploy $(date -u +%FT%TZ)"
